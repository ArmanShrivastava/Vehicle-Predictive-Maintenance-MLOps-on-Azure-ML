apiVersion: v1
kind: Pod
metadata: { name: gpu-smoke-test, namespace: vw-training }
spec:
  restartPolicy: Never
  nodeSelector: 
    pool: gpu
  tolerations:
  - { key: nvidia.com/gpu, operator: Exists, effect: NoSchedule }
  - { key: kubernetes.azure.com/scalesetpriority, operator: Equal, value: spot, effect: NoSchedule }
  containers:
  - name: cuda
    image: nvcr.io/nvidia/cuda:12.2.2-base-ubuntu22.04
    command: ["nvidia-smi"]
    resources:
      limits: 
        nvidia.com/gpu: 1
        memory: 8Gi
      requests:
        memory: 4Gi


#restartPolicy: Never is set because this is a smoke test pod designed to validate GPU availability once, not run continuously.

# Function in this project:

# One-time validation - It runs nvidia-smi to verify the GPU is available and functioning properly on the Kubernetes cluster before running actual training jobs