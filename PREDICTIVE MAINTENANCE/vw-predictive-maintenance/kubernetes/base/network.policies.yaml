# ============================================================================
# DEFAULT DENY INGRESS POLICY
# ============================================================================
# PURPOSE: Implement zero-trust security model - deny all inbound traffic by 
# default, then explicitly allow only necessary traffic through additional policies.
#
# FUNCTION:
# - podSelector: {} matches ALL pods in the namespace
# - policyTypes: [Ingress] blocks all incoming connections unless explicitly allowed
# - This prevents unauthorized access and lateral movement within the cluster
# - Acts as a baseline security firewall for the vw-serving namespace
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: vw-serving
spec: 
  podSelector: {}
  policyTypes:
    - Ingress
---

# ============================================================================
# ALLOW ISTIO INGRESS GATEWAY TO REACH INFERENCE SERVICE
# ============================================================================
# PURPOSE: Enable the service mesh (Istio) to route traffic to the KServe 
# inference service while maintaining security boundary.
#
# FUNCTION:
# - apiVersion: networking.k8s.io/v1 - Kubernetes NetworkPolicy API
# - podSelector.matchLabels: Targets only pods that serve the KServe inference service
#   (labeled by KServe with serving.kserve.io/inferenceservice: vw-failure-predictor)
# - ingress.from.namespaceSelector: Allows traffic ONLY from istio-system namespace
#   (where Istio control plane and ingress gateway reside)
# - This ensures:
#   ✓ External traffic reaches inference service via Istio ingress controller
#   ✓ Only Istio can communicate with the predictor (not arbitrary pods)
#   ✓ Maintains network isolation while enabling service mesh features
#   ✓ Enables metrics collection, traffic management, and security policies
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-istio-to-predictor
  namespace: vw-serving
spec: 
  podSelector:
    matchLabels:
      serving.kserve.io/inferenceservice: vw-failure-predictor
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: istio-system

---

# ============================================================================
# ALLOW PROMETHEUS MONITORING TO SCRAPE METRICS
# ============================================================================
# PURPOSE: Enable the monitoring stack (Prometheus) to collect metrics from 
# inference service pods for observability and alerting.
#
# FUNCTION:
# - podSelector (empty): Applies to ALL pods in vw-serving namespace
# - ingress.from.namespaceSelector: Allows traffic ONLY from vw-monitoring namespace
#   (where Prometheus scraper runs)
# - This enables:
#   ✓ Prometheus to scrape /metrics endpoints on port 8000 or 9000
#   ✓ Collect KServe predictor metrics (prediction latency, throughput, errors)
#   ✓ Monitor resource usage (CPU, memory, GPU) for the serving workloads
#   ✓ Feed metrics to alerting rules and Grafana dashboards
#   ✓ Detect anomalies and performance degradation in real-time
#
# SECURITY BENEFIT:
# - Only monitoring stack can access metrics endpoints
# - Prevents external parties from discovering service details via metrics
# - Maintains zero-trust model while allowing necessary observability
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-to-scrape
  namespace: vw-serving
spec:
  podSelector: {}
  ingress: 
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: vw-monitoring

    