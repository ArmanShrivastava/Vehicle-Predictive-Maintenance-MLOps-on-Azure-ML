# this is the configuration for the GPU Operator.

# The GPU Operator is a Kubernetes operator that manages the lifecycle of NVIDIA GPU resources in a Kubernetes cluster. It automates the deployment and management of NVIDIA drivers, CUDA, and other GPU-related components.

driver:
  enabled: true
  version: "535.104.12"
  # The driver version to be installed on the nodes. This should match the version of the NVIDIA drivers that are compatible with your GPU hardware.
  # Using  pre-compiled drivers is recommended for production environments to ensure stability and compatibilit and faster node startup times.
  # Witout this , driver compilatiob takes 10-15 minutes per node which is not ideal.

  usePrecompiledDrivers: true
  manager:
   image: 
     repository: nvcr.io/nvidia/cloud-native/gpu-operator-validator
   env:
   - name: ENABLE_AUTO_DRAIN
     value: "true"
  #this enables auto drain means that when a node is being updated with the new driver, it will be automatically drained to prevent scheduling of new pods on it until the update is complete. 
  #This helps to ensure that the node is not used while the driver is being updated, which can help to prevent issues with GPU workloads during the update process.

toolkit: 
  enabled : true
  version: "v1.14.3-ubuntu20.04"
  # The version of the NVIDIA Container Toolkit to be installed on the nodes. This should match the version of the NVIDIA Container Toolkit that is compatible with your GPU hardware and the driver version you are using.

devicePlugin:
  enabled: true
  config:
    name: time-slicing-config
    data:
      any: |-
        version: v1
        flags:
          migStrategy: "none"
        sharing:
          timeSlicing:
            resources:
            - name: nvidia.com/gpu
              replicas: 4  
  # This configuration enables time-slicing for the NVIDIA GPU resources. Time-slicing allows multiple pods to share a single GPU by dividing the GPU's resources into time slices.Each GPU is divided into 4 time slices, allowing up to 4 pods to share a single GPU. 
  #This can help to improve resource utilization and allow more workloads to run on the same GPU hardware.

dcgm:
  enabled: true

dcgmExporter:
  enabled: true
  config:
    name: dcgm-exporter-config
    data:
     dcgm-metrics-csv: |-
        # GPU Utilization — are we wasting GPU capacity?
        DCGM_FI_DEV_GPU_UTIL,      gauge, GPU utilization (in %)
        # Memory — are we close to OOM?
        DCGM_FI_DEV_FB_FREE,       gauge, Framebuffer memory free (in MiB)
        DCGM_FI_DEV_FB_USED,       gauge, Framebuffer memory used (in MiB)
        # Temperature — thermal throttling?
        DCGM_FI_DEV_GPU_TEMP,      gauge, GPU temperature (in C)
        # Power — cost tracking
        DCGM_FI_DEV_POWER_USAGE,   gauge, Power draw (in W)
        # Clock speeds — are we throttling?
        DCGM_FI_DEV_SM_CLOCK,      gauge, SM clock frequency (in MHz)
        DCGM_FI_DEV_MEM_CLOCK,     gauge, Memory clock frequency (in MHz)
        # PCIe throughput — data transfer bottleneck?
        DCGM_FI_DEV_PCIE_TX_THROUGHPUT, counter, PCIe TX throughput
        DCGM_FI_DEV_PCIE_RX_THROUGHPUT, counter, PCIe RX throughput
        # NVLink — multi-GPU communication
        DCGM_FI_DEV_NVLINK_BANDWIDTH_TOTAL, counter, NVLink bandwidth
        # MIG metrics — per-slice monitoring
        DCGM_FI_PROF_GR_ENGINE_ACTIVE, gauge, Ratio of time the graphics engine is active
        DCGM_FI_PROF_SM_ACTIVE,        gauge, Ratio of cycles with at least 1 warp assigned
        DCGM_FI_PROF_DRAM_ACTIVE,      gauge, Ratio of cycles the device memory is active
        # Error tracking — hardware failures
        DCGM_FI_DEV_ECC_SBE_VOL_TOTAL, counter, ECC single bit errors (volatile)
        DCGM_FI_DEV_ECC_DBE_VOL_TOTAL, counter, ECC double bit errors (volatile, serious)
        DCGM_FI_DEV_XID_ERRORS,        gauge, XID errors (GPU hardware/driver errors)

  serviceMonitor:
    enabled: true  #Prometheus Operator is used to scrape metrics from the DCGM Exporter. This allows you to monitor the health and performance of your NVIDIA GPU resources using Prometheus and Grafana.
    interval: 15s

mig:
  enabled: mixed
#Allow both MIG and non-MIG pods on same node




